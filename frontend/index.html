<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TeamTask</title>

  <!-- ── Styles ─────────────────────────────────────────── -->
  <link rel="stylesheet" href="styles/global.css"/>
  <link rel="stylesheet" href="styles/layout.css"/>
  <link rel="stylesheet" href="styles/auth.css"/>
  <link rel="stylesheet" href="styles/dashboard.css"/>
  <link rel="stylesheet" href="styles/project.css"/>
  <link rel="stylesheet" href="styles/modal.css"/>
  <link rel="stylesheet" href="styles/components.css"/>
</head>
<body>

<!-- ── AUTH SCREEN ──────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>TeamTask</h1>
    <p id="auth-subtitle">Sign in to your account</p>
    <div id="auth-error" class="error-msg hidden"></div>

    <!-- Signup-only fields -->
    <div id="signup-fields" class="hidden">
      <div class="form-group">
        <label>Full Name</label>
        <input id="auth-name" type="text" placeholder="Your name"/>
      </div>
      <div class="form-group">
        <label>I want to join as</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
          <label style="display:flex;align-items:center;gap:8px;padding:10px 12px;border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;font-weight:400" id="role-admin-label">
            <input type="radio" name="auth-role" id="role-admin" value="admin" style="width:auto;margin:0"/>
            <span>
              <strong style="display:block;font-size:13px">Admin</strong>
              <span style="font-size:11px;color:var(--text-muted)">Create &amp; manage projects</span>
            </span>
          </label>
          <label style="display:flex;align-items:center;gap:8px;padding:10px 12px;border:2px solid var(--primary);border-radius:var(--radius);cursor:pointer;font-weight:400;background:#eff6ff" id="role-member-label">
            <input type="radio" name="auth-role" id="role-member" value="member" checked style="width:auto;margin:0"/>
            <span>
              <strong style="display:block;font-size:13px">Member</strong>
              <span style="font-size:11px;color:var(--text-muted)">Join &amp; work on tasks</span>
            </span>
          </label>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input id="auth-email" type="email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="auth-password" type="password" placeholder="••••••••" oninput="onSignupPasswordInput()"/>
      <!-- Live requirement hints — shown only during signup -->
      <ul class="pw-hint-list hidden" id="pw-hints">
        <li id="hint-letters">6+ letters</li>
        <li id="hint-numbers">3+ numbers</li>
        <li id="hint-special">2+ special characters</li>
        <li id="hint-length">11+ characters total</li>
      </ul>
    </div>

    <button class="btn btn-primary btn-full" id="auth-submit-btn" onclick="submitAuth()">Sign In</button>
    <p style="text-align:center;margin-top:16px;color:var(--text-muted);font-size:13px;">
      <span id="auth-toggle-text">Don't have an account?</span>
      <a class="link" onclick="toggleAuthMode()" id="auth-toggle-link"> Sign up</a>
    </p>
  </div>
</div>

<!-- ── MAIN APP ──────────────────────────────────────────── -->
<div id="app" class="hidden">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-logo">TeamTask</div>
    <div style="padding:8px;">
      <div class="sidebar-section">Navigation</div>
      <div class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')">Dashboard</div>
      <div class="nav-item"        id="nav-projects"  onclick="navigate('projects')">Projects</div>
      <div class="sidebar-section" style="margin-top:8px;">My Projects</div>
      <div id="sidebar-projects"></div>
    </div>
    <div class="sidebar-bottom">
      <div class="user-info">
        <strong id="sidebar-user-name">—</strong>
        <span    id="sidebar-user-email"></span>
        <span    id="sidebar-user-role" style="margin-top:4px;display:inline-block"></span>
      </div>
      <button class="btn btn-ghost btn-sm btn-full" style="margin-bottom:6px" onclick="openUpdatePasswordModal()">🔒 Update Password</button>
      <button class="btn btn-ghost btn-sm btn-full" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <!-- Main content area -->
  <div id="main">
    <div id="topbar">
      <span class="page-title" id="page-title">Dashboard</span>
      <div class="flex gap-8" id="topbar-actions"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- ── MODAL ────────────────────────────────────────────── -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div id="modal-content"></div>
  </div>
</div>

<!-- ── TOAST ────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── Scripts: load order matters ──────────────────────── -->

<!-- Utilities (no dependencies) -->
<script src="js/utils/helpers.js"></script>
<script src="js/utils/formatters.js"></script>
<script src="js/utils/validators.js"></script>

<!-- State (no dependencies) -->
<script src="js/state.js"></script>

<!-- UI components (depend on helpers) -->
<script src="js/components/toast.js"></script>
<script src="js/components/modal.js"></script>
<script src="js/components/badges.js"></script>
<script src="js/components/stats.js"></script>
<script src="js/components/table.js"></script>
<script src="js/components/topbar.js"></script>
<script src="js/components/sidebar.js"></script>

<!-- API layer (depends on state) -->
<script src="js/api/api.js"></script>
<script src="js/api/authApi.js"></script>
<script src="js/api/projectApi.js"></script>
<script src="js/api/taskApi.js"></script>

<!-- Auth (depends on api, state, components) -->
<script src="js/auth/auth.js"></script>
<script src="js/auth/login.js"></script>
<script src="js/auth/signup.js"></script>
<script src="js/auth/password.js"></script>

<!-- Router (depends on page renderers — loaded below) -->
<!-- Tasks -->
<script src="js/tasks/tasks.js"></script>
<script src="js/tasks/createTask.js"></script>
<script src="js/tasks/editTask.js"></script>
<script src="js/tasks/filters.js"></script>

<!-- Projects -->
<script src="js/projects/createProject.js"></script>
<script src="js/projects/members.js"></script>
<script src="js/projects/projects.js"></script>
<script src="js/projects/projectDetails.js"></script>

<!-- Dashboard -->
<script src="js/dashboard/dashboard.js"></script>

<!-- Router (all page renderers now defined) -->
<script src="js/router.js"></script>

<!-- Entry point — boots the app -->
<script src="js/app.js"></script>

</body>
</html>
